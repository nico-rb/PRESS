# Experiment: same as baseline but a single epoch. Three epochs overfit this small
# subset (val accuracy drops after epoch 1); see docs/adr/0001.

# data
train_path: data/downloads/train.parquet
val_path: data/downloads/validation.parquet

# model
model_name: distilbert-base-uncased
num_labels: 4
max_length: 128

# training
batch_size: 16
learning_rate: 0.00005
epochs: 1
seed: 42

# output
output_dir: outputs/1-epoch
