# Baseline experiment: fine-tune DistilBERT on the AG News subset (CPU).

# data
train_path: data/downloads/train.parquet
val_path: data/downloads/validation.parquet

# model
model_name: distilbert-base-uncased
num_labels: 4
max_length: 128

# training
batch_size: 16
learning_rate: 0.00005
epochs: 3
seed: 42

# output
output_dir: outputs/models/baseline
